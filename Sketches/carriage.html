<!DOCTYPE html>
<html lang="">
<head>
	<meta charset="utf-8">
	<title>Carriage</title>
	<link rel="stylesheet" href="carriage.css">
</head>
<body>
<main>
	<h1>Плацкарт</h1>
	<div id="c54" class="carriage"></div>
	<script>
		let htmlResult = ''
		for (let i = 0; i < 36; i++) {
			if (i % 4 === 0) {
				htmlResult += '<div class="room">';
			}

			const pClass = i % 4 + 1;
			htmlResult += `<p class="i${pClass}">${i + 1}</p>`;

			if ((i + 1) % 4 === 0) {
				htmlResult += '</div>';
			}
		}
		htmlResult += '<div class="full9"></div>';
		for (let i = 54; i > 36; i -= 2) {
			htmlResult += `<div class="room2"><p>${i}</p><p>${i - 1}</p></div>`;
		}
		document.getElementById('c54').innerHTML = htmlResult;
	</script>

	<h1>Купе</h1>
	<div id="c36" class="carriage"></div>
	<script>
		htmlResult = ''
		for (let i = 0; i < 36; i++) {
			if (i % 4 === 0) {
				htmlResult += '<div class="room">';
			}

			const pClass = i % 4 + 1;
			htmlResult += `<p class="i${pClass}">${i + 1}</p>`;

			if ((i + 1) % 4 === 0) {
				htmlResult += '</div>';
			}
		}
		document.getElementById('c36').innerHTML = htmlResult;
	</script>

	<h1>СВ</h1>
	<div id="c18" class="carriage"></div>
	<script>
		htmlResult = ''
		for (let i = 0; i < 18; i++) {
			if (i % 2 === 0) {
				htmlResult += '<div class="room2 SV">';
			}

			const pClass = i % 2 + 1;
			htmlResult += `<p>${i + 1}</p>`;

			if ((i + 1) % 2 === 0) {
				htmlResult += '</div>';
			}
		}
		document.getElementById('c18').innerHTML = htmlResult;
	</script>
</main>
</body>
</html>
