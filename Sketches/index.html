<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
	<meta name="google" content="notranslate">
	<meta name="theme-color" content="#121212">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
	<title>Buy ticket</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>PuPu</h1>
		<div>
			<span>a1</span>
			<span>a2</span>
			<span>a3</span>
		</div>
	</header>
	<main>
		<div class="size-display-1">
			<h2 class="c-white">Путь</h2>
			<div class="search-row">
				<input type="text" placeholder="Откуда" class="interactive-elem">
				<input type="text" placeholder="Куда" class="interactive-elem">
			</div>
		</div>
		<div class="size-display-1">
			<h2 class="c-white">Дата отправления</h2>
			<div class="search-row">
				<input type="date" class="interactive-elem">
			</div>
		</div>
		<div class="size-display-1">
			<h2 class="c-white">Пассажиры</h2>
			<div class="passengers">
				<div class="interactive-elem passenger">
					<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="24" height="24" stroke-width="1.7" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
					</svg>
					<p>Пассажир</p>
				</div>
				<div class="interactive-elem passenger">
					<svg style="background-color: darkblue;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="24" height="24" stroke-width="1.7" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
					</svg>
					<p>Студент</p>
				</div>
				<div class="interactive-elem passenger">
					<svg style="background-color: darkorchid;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="24" height="24" stroke-width="1.7" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
					</svg>
					<p>Ребенок</p>
				</div>
				<div class="interactive-elem passenger">
					<svg style="background-color: darkred;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="24" height="24" stroke-width="1.7" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
					</svg>
					<p>Пенсионер</p>
				</div>
				<div class="interactive-elem passenger">
					<svg class="white-and-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" width="24" height="24" stroke-width="1.7" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
					</svg>
					<p>Добавить пассажира</p>
				</div>
			</div>
		</div>
		<div class="size-display-1">
			<button id="btn" class="interactive-elem">НАЙТИ</button>
		</div>
	</main>
</body>
</html>
